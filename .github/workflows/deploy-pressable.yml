name: Deploy to Pressable

on:
  push:
    branches:
      - main
    paths:
      - 'wp-content/plugins/saint-johns-butchery/**'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy plugin via SFTP
        uses: wlixcc/SFTP-Deploy-Action@v1.2.4
        with:
          server: ${{ secrets.PRESSABLE_SFTP_HOST }}
          port: 22
          username: ${{ secrets.PRESSABLE_SFTP_USER }}
          password: ${{ secrets.PRESSABLE_SFTP_PASS }}
          local_path: ./wp-content/plugins/saint-johns-butchery/*
          remote_path: /htdocs/wp-content/plugins/saint-johns-butchery/
          sftp_only: true
          delete_remote_files: false
